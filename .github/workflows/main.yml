name: Daily EGX Scan

on:
  schedule:
    - cron: '0 13 * * *' # Runs at 13:00 UTC (3:00 PM Cairo Time)
  workflow_dispatch: # Allows manual run for testing

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run script
        run: python stock.py

      - name: Commit and push JSON report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_report.json
          git commit -m "Update daily report $(date +'%Y-%m-%d')" || exit 0
          git push
