name: Daily EGX Scan
on:
  workflow_dispatch: # تشغيل يدوي للتحقق

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # إعطاء السيرفر حق الكتابة والرفع
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas ta

      - name: Run Tracker
        run: python stock.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_report.json
          git commit -m "Update EGX Data" || echo "No changes"
          git push
