name: Daily EGX Scan

on:
  schedule:
    # Runs at 13:00 UTC (which is 3:00 PM Cairo Time)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows you to run it manually anytime for testing

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Required if your script needs to write/save files (like daily_report.json)
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/set-up-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up future runs by caching libraries

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run EGX Analyzer
        run: python stock.py

      - name: Commit and Push Report
        # This part ensures that if a new .json report is created, it's saved to your repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add daily_report.json
          git commit -m "Auto-update: Daily EGX Report $(date +'%Y-%m-%d')" || exit 0
          git push
